version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: melody-postgres
    environment:
      POSTGRES_DB: melody_ai
      POSTGRES_USER: melody
      POSTGRES_PASSWORD: ${DB_PASSWORD:-melody_secret_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melody -d melody_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - melody-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: melody-redis
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:-redis_secret_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - melody-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: melody-app
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://melody:${DB_PASSWORD:-melody_secret_password}@postgres:5432/melody_ai?schema=public
      - REDIS_URL=redis://default:${REDIS_PASSWORD:-redis_secret_password}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your_refresh_secret_change_me}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your_nextauth_secret_change_me}
      - NEXTAUTH_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-melody-ai}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - NEXT_PUBLIC_CDN_URL=${NEXT_PUBLIC_CDN_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - melody-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.5'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: melody-worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://melody:${DB_PASSWORD:-melody_secret_password}@postgres:5432/melody_ai?schema=public
      - REDIS_URL=redis://default:${REDIS_PASSWORD:-redis_secret_password}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_me}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-melody-ai}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - NEXT_PUBLIC_CDN_URL=${NEXT_PUBLIC_CDN_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - melody-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Nginx reverse proxy (اختياري - للإنتاج)
  nginx:
    image: nginx:alpine
    container_name: melody-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/html/static:ro
    depends_on:
      - app
    networks:
      - melody-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    name: melody_postgres_data
  redis_data:
    name: melody_redis_data

networks:
  melody-network:
    name: melody_network
    driver: bridge
