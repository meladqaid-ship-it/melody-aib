# render.yaml — Render Deployment Config
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: melody-ai-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

  - type: worker
    name: melody-ai-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AI_WORKER_CONCURRENCY
        value: "3"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
